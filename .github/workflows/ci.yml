name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Lint & Test ─────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check backend/

      - name: Unit tests
        run: pytest backend/tests/unit/ -v --tb=short

      - name: Integration tests
        run: pytest backend/tests/integration/ -v --tb=short

  # ── Claude Code Review (PRs only) ───────────────────────────────────────────
  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are a senior engineer with deep expertise in:
            - AWS serverless architecture (Lambda, DynamoDB, S3, API Gateway, CDK)
            - Python 3.12 backend development
            - React + TypeScript frontend development
            - Cloud security (IAM least-privilege, secrets management, OWASP top 10)

            Review this pull request and post a concise, actionable code review.
            Focus on:
            - Correctness and logic bugs
            - Security issues (IAM policies, secret handling, injection risks, auth flaws)
            - AWS best practices (CDK patterns, DynamoDB access patterns, Lambda cold start)
            - Performance problems
            Skip style nits and formatting. Be specific — reference file and line
            numbers where relevant. If the changes look good, say so briefly.
